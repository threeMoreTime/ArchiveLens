<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP：默认只允许同源；图片允许 al-resource:（自定义协议）与 data:（base64）；
      connect-src 仅 'self'，禁止任何公网请求（任务 §三十六）。
      Phase 6 将在 main 进程按 dev/prod 动态收紧。
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data: blob: al-resource:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-eval'; connect-src 'self' ws: http://localhost:*;"
    />
    <title>ArchiveLens</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
