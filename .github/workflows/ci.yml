name: ci

on:
  push:
    branches:
      - main
      - "feat/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"
  ARCHIVELENS_TEST_RUN_ID: "a11-ci-${{ github.run_id }}"

jobs:
  engine-tests:
    name: Engine Tests
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install engine dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r engine/requirements-lock.txt

      - name: Prepare locked unified OCR model
        run: powershell -ExecutionPolicy Bypass -File scripts/prepare-native-runtime.ps1 -OcrOnly

      - name: Compile engine sources
        run: python -m compileall -q engine/src

      - name: Run engine tests with coverage budgets
        run: python scripts/run-python-coverage.py

      - name: Upload engine coverage summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engine-coverage
          path: |
            coverage/python/coverage.json
            coverage/python/budget-summary.json
          if-no-files-found: error
          retention-days: 14

      - name: Run source license compliance gate
        run: python scripts/verify-license-compliance.py --mode source

  desktop-tests:
    name: Desktop Tests
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.10.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Electron runtime serially
        run: pnpm --filter @archivelens/desktop exec install-electron

      - name: Desktop typecheck
        run: pnpm --filter @archivelens/desktop typecheck

      - name: Workspace ESLint
        run: pnpm lint

      - name: Desktop Vitest with coverage budgets
        run: pnpm test:coverage

      - name: Desktop build
        run: pnpm --filter @archivelens/desktop build

      - name: Enforce bundle budgets
        run: pnpm check:bundle

      - name: Upload quality summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-quality
          path: |
            coverage/desktop/coverage-summary.json
            coverage/desktop/budget-summary.json
            coverage/bundle-budget.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload desktop build output
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-out
          path: apps/desktop/out
          if-no-files-found: error
          retention-days: 7

  ipc-contract:
    name: IPC Contract
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.10.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install engine dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r engine/requirements-lock.txt

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate TS IPC contract fixtures
        run: pnpm --filter @archivelens/desktop test:contract

      - name: Validate Python IPC contract fixtures
        env:
          PYTHONPATH: engine/src;.
        run: python -m unittest engine.tests.test_ipc_contract -v

  lifecycle-e2e:
    name: Lifecycle E2E
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.10.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install engine dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r engine/requirements-lock.txt

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Electron runtime serially
        run: pnpm --filter @archivelens/desktop exec install-electron

      - name: Prepare locked unified OCR model
        run: powershell -ExecutionPolicy Bypass -File scripts/prepare-native-runtime.ps1 -OcrOnly

      - name: Build desktop app
        run: pnpm --filter @archivelens/desktop build

      - name: Run lifecycle, custom-search, and review-completeness Playwright suites
        run: |
          $env:ARCHIVELENS_E2E_PYTHON = Join-Path $env:pythonLocation "python.exe"
          pnpm --filter @archivelens/desktop exec playwright test e2e/lifecycle.spec.ts e2e/custom-search.spec.ts e2e/review-completeness.spec.ts

      - name: Upload lifecycle artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lifecycle-e2e-artifacts
          path: |
            apps/desktop/test-results
            apps/desktop/playwright-report
          if-no-files-found: ignore
          retention-days: 14

  package-smoke:
    name: Packaged Smoke
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.10.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Resolve candidate version
        run: |
          $version = node -p "require('./package.json').version"
          "ARCHIVELENS_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install engine dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r engine/requirements-lock.txt

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Electron runtime serially
        run: pnpm --filter @archivelens/desktop exec install-electron

      - name: Validate PowerShell release scripts (Windows PowerShell)
        shell: powershell
        run: |
          $scripts = @(
            'scripts/build-engine.ps1',
            'scripts/prepare-native-runtime.ps1',
            'scripts/release-smoke-evidence.ps1',
            'scripts/run-zero-cost-release-gate.ps1',
            'scripts/verify-release-chain.ps1',
            'scripts/smoke-installer.ps1',
            'scripts/smoke-portable.ps1',
            'scripts/cleanup-test-artifacts.ps1'
          )

          foreach ($script in $scripts) {
            $tokens = $null
            $errors = $null

            [void][System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $script),
              [ref]$tokens,
              [ref]$errors
            )

            if ($errors.Count -gt 0) {
              Write-Host "[FAIL] PowerShell parse errors: $script"
              $errors | Format-List *
              exit 1
            }

            Write-Host "[PASS] Windows PowerShell syntax: $script"
          }

      - name: Validate PowerShell release scripts (PowerShell 7)
        shell: pwsh
        run: |
          $scripts = @(
            'scripts/build-engine.ps1',
            'scripts/prepare-native-runtime.ps1',
            'scripts/release-smoke-evidence.ps1',
            'scripts/run-zero-cost-release-gate.ps1',
            'scripts/verify-release-chain.ps1',
            'scripts/smoke-installer.ps1',
            'scripts/smoke-portable.ps1',
            'scripts/cleanup-test-artifacts.ps1'
          )

          foreach ($script in $scripts) {
            $tokens = $null
            $errors = $null

            [void][System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $script),
              [ref]$tokens,
              [ref]$errors
            )

            if ($errors.Count -gt 0) {
              Write-Host "[FAIL] PowerShell parse errors: $script"
              $errors | Format-List *
              exit 1
            }

            Write-Host "[PASS] PowerShell 7 syntax: $script"
          }

      - name: Prepare locked native runtime
        run: powershell -ExecutionPolicy Bypass -File scripts/prepare-native-runtime.ps1

      - name: Build packaged engine
        run: powershell -ExecutionPolicy Bypass -File scripts/build-engine.ps1

      - name: Build desktop app
        run: pnpm --filter @archivelens/desktop build

      - name: Build win-unpacked
        run: pnpm --filter @archivelens/desktop exec electron-builder --dir

      - name: Run packaged license compliance gate
        run: |
          python scripts/verify-license-compliance.py `
            --mode packaged `
            --resources-root apps/desktop/release/win-unpacked/resources `
            --candidate-sha $env:GITHUB_SHA

      - name: Run bundled native offline smoke
        run: |
          python scripts/offline-native-smoke.py `
            --resources-root apps/desktop/release/win-unpacked/resources `
          | Tee-Object -FilePath apps/desktop/release/offline-native-smoke.json

      - name: Run packaged OCR smoke matrix
        run: |
          $cases = @(
            'custom-single',
            'custom-double',
            'custom-multi',
            'custom-english',
            'custom-special',
            'custom-no-hit',
            'legacy-pair-simplified',
            'legacy-pair-traditional'
          )
          New-Item -ItemType Directory -Force apps/desktop/release | Out-Null
          foreach ($case in $cases) {
            python scripts/packaged-ocr-smoke.py --case-id $case 2>&1 |
              Tee-Object -FilePath apps/desktop/release/packaged-ocr.log -Append
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Run shutdown inference smoke
        run: python scripts/shutdown-inference-smoke.py

      - name: Run HTML smoke
        run: python scripts/html-smoke.py

      - name: Generate partial release manifest
        run: |
          python scripts/generate-manifest.py `
            --version $env:ARCHIVELENS_VERSION `
            --candidate-sha $env:GITHUB_SHA `
            --allow-partial

      - name: Verify partial release chain
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/verify-release-chain.ps1 `
            -CandidateSha $env:GITHUB_SHA `
            -Version $env:ARCHIVELENS_VERSION `
            -WorktreePath $PWD `
            -EngineAppInfo (Resolve-Path 'dist/engine/win-x64/app.info.json').Path `
            -DesktopAppInfo (Resolve-Path 'apps/desktop/release/win-unpacked/resources/app.info.json').Path `
            -ManifestPath (Resolve-Path 'apps/desktop/release/release-manifest.json').Path `
            -EngineExe (Resolve-Path 'dist/engine/win-x64/archivelens-engine.exe').Path `
            -DesktopExe (Resolve-Path 'apps/desktop/release/win-unpacked/ArchiveLens.exe').Path `
            -BundledEngineExe (Resolve-Path 'apps/desktop/release/win-unpacked/resources/engine/win-x64/archivelens-engine.exe').Path `
          | Tee-Object -FilePath apps/desktop/release/verify-release-chain.json

      - name: Upload packaged smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: packaged-smoke-artifacts
          path: |
            dist/engine/win-x64/app.info.json
            dist/native/win-x64/native-runtime.json
            dist/native/win-x64/native-dependencies.lock.json
            apps/desktop/release/release-manifest.json
            apps/desktop/release/SHA256SUMS.txt
            apps/desktop/release/verify-release-chain.json
            apps/desktop/release/packaged-ocr.log
            apps/desktop/release/offline-native-smoke.json
            apps/desktop/release/win-unpacked/resources/app.info.json
          if-no-files-found: ignore
          retention-days: 14
